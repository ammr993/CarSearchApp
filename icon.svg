<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1c1c24"/>
  <g transform="translate(256,270)">
    <!-- Car body -->
    <path d="M-120,10 L-100,-40 -60,-80 60,-80 100,-40 120,10 120,40 -120,40Z" fill="#5b8def" stroke="#4a7de0" stroke-width="4"/>
    <!-- Windshield -->
    <path d="M-55,-75 L-35,-40 55,-40 35,-75Z" fill="#2a2a36" opacity="0.7"/>
    <!-- Wheels -->
    <circle cx="-70" cy="45" r="24" fill="#2a2a36" stroke="#5b8def" stroke-width="4"/>
    <circle cx="-70" cy="45" r="10" fill="#5b8def"/>
    <circle cx="70" cy="45" r="24" fill="#2a2a36" stroke="#5b8def" stroke-width="4"/>
    <circle cx="70" cy="45" r="10" fill="#5b8def"/>
  </g>
  <!-- Magnifying glass -->
  <g transform="translate(340,150)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#e4e4e8" stroke-width="10"/>
    <line x1="30" y1="30" x2="58" y2="58" stroke="#e4e4e8" stroke-width="10" stroke-linecap="round"/>
  </g>
</svg>
